<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimi Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 h-screen flex flex-col text-lg lg:text-xl">
    <div id="main-header" class="flex justify-between items-center mb-8 bg-gray-900 text-white p-4 rounded shadow">
        <h1 class="header-title">✅ Ordini Pagati</h1>
        <div class="space-x-4">
            <a href="/static/orders.html" class="bg-orange-500 hover:bg-orange-400 px-4 py-2 rounded header-btn text-white no-underline text-center">⚠️ Da Pagare</a>
            <a href="/export/orders" target="_blank" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded header-btn text-white no-underline text-center">📄 Esporta PDF</a>
            <button onclick="nukeLedger()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded header-btn text-white">🔥 Elimina Ordini</button>
            <a href="/" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded header-btn text-white no-underline text-center">Torna al POS</a>
        </div>
    </div>

    <div id="main-panel" class="bg-white p-6 rounded shadow flex flex-col flex-grow overflow-hidden order-list-container">
        <h2 class="order-list-header border-b pb-2 mb-4">Storico Completati</h2>
        <div id="order-list" class="flex-grow overflow-y-auto space-y-4 pr-2">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        let orders = [];

        async function init() {
            const resp = await fetch('/orders');
            orders = await resp.json();
            renderOrders();
        }

        function renderOrders() {
            const list = document.getElementById('order-list');
            list.innerHTML = '';

            const paidOrders = orders.filter(o => o.payment_status);

            if(paidOrders.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-center font-bold mt-10">Nessun ordine pagato trovato.</div>';
                return;
            }

            paidOrders.forEach(o => {
                const dateRaw = new Date(o.timestamp);
                const dateStr = dateRaw.toLocaleString();

                let itemsHtml = '';
                o.items.forEach(i => {
                    const ingrStr = i.ingredients ? `<div class="cart-item-details text-blue-600">${i.ingredients}</div>` : '';
                    const notesStr = i.notes ? `<div class="cart-item-details text-gray-500 italic">Nota: ${i.notes}</div>` : '';

                    let comboStr = '';
                    if (i.combo_choices) {
                        comboStr = i.combo_choices.split(',').map(c => `<div class="cart-item-details text-purple-700 pl-3">&bull; ${c.trim()}</div>`).join('');
                    }

                    itemsHtml += `
                        <div class="flex justify-between border-b border-gray-200 py-1">
                            <div>
                                <span class="order-detail-title text-gray-800">${i.description}${i.combo_choices ? ':' : ''}</span>
                                ${comboStr}
                                ${ingrStr}
                                ${notesStr}
                            </div>
                            <div class="order-detail-price font-mono text-green-700">€${i.price_at_sale.toFixed(2)}</div>
                        </div>
                    `;
                });

                list.innerHTML += `
                    <div class="border rounded shadow-sm bg-gray-50">
                        <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-100" onclick="toggleDetails(${o.id})">
                            <div class="flex space-x-6 items-center">
                                <span class="order-item-id text-gray-800">#${o.id}</span>
                                <span class="text-gray-500">${dateStr}</span>
                                ${o.takeaway ? '<span class="bg-orange-500 text-white order-item-badge px-3 py-1 rounded">DA ASPORTO</span>' : ''}
                                ${o.table_number && o.table_number !== "Nessuno" ? `<span class="bg-purple-600 text-white order-item-badge px-3 py-1 rounded">Tavolo: ${o.table_number}</span>` : ''}
                                <span class="bg-blue-100 text-blue-800 order-item-badge px-3 py-1 rounded border border-blue-200">${o.payment_method}</span>
                            </div>
                            <div class="flex items-center space-x-4">
                                <div class="text-right">
                                    <div class="order-item-discount text-red-500">${o.discount > 0 ? "Sconto: -€" + o.discount.toFixed(2) : ""}</div>
                                    <div class="order-item-total text-green-600">€${o.total.toFixed(2)}</div>
                                </div>
                                <span id="chev-${o.id}" class="text-gray-400 font-bold text-2xl ml-4">▼</span>
                            </div>
                        </div>
                        <div id="details-${o.id}" class="hidden p-4 bg-white border-t border-gray-200">
                            <h3 class="order-detail-title mb-2">Articoli dell'Ordine</h3>
                            ${itemsHtml}
                            ${o.notes ? `<div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded"><span class="order-detail-title text-blue-800">Note Ordine:</span><p class="text-blue-900 mt-1">${o.notes}</p></div>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function toggleDetails(id) {
            const el = document.getElementById(`details-${id}`);
            const chev = document.getElementById(`chev-${id}`);
            if(el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                chev.innerText = '▲';
            } else {
                el.classList.add('hidden');
                chev.innerText = '▼';
            }
        }

        async function nukeLedger() {
            if(!confirm("Sei sicuro di voler cancellare completamente il registro degli ordini?")) return;
            if(!confirm("Sei VERAMENTE sicuro? Questo reimpsterà permanentemente gli ID degli Ordini a #1!")) return;

            const resp = await fetch('/orders', { method: 'DELETE' });
            if(resp.ok) {
                alert("Registro completamente cancellato. Generazione ID reimpostata a #1.");
                init();
            } else {
                alert("Errore cancellazione registro.");
            }
        }

        init();
    </script>
</body>
</html>
